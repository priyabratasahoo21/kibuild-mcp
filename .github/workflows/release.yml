name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=darwin  GOARCH=arm64  go build -ldflags="-s -w" -o dist/kibuild-mcp-darwin-arm64   .
          GOOS=darwin  GOARCH=amd64  go build -ldflags="-s -w" -o dist/kibuild-mcp-darwin-amd64   .
          GOOS=linux   GOARCH=amd64  go build -ldflags="-s -w" -o dist/kibuild-mcp-linux-amd64    .
          GOOS=windows GOARCH=amd64  go build -ldflags="-s -w" -o dist/kibuild-mcp-windows-amd64.exe .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
